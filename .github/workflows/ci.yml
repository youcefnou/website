name: CI

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Run TypeScript type check
      run: npx tsc --noEmit
    
    - name: Build project
      run: npm run build
      env:
        # Provide dummy env vars for build
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_key_for_build
        SUPABASE_SERVICE_ROLE_KEY: dummy_service_key
        CLOUDINARY_CLOUD_NAME: dummy_cloud
        CLOUDINARY_API_KEY: dummy_api_key
        CLOUDINARY_API_SECRET: dummy_api_secret
    
    - name: Run tests (if available)
      run: npm test --if-present
      continue-on-error: true
